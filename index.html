<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1a2e" />
    <title>LAN Clipboard</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <div class="header-inner">
          <div class="header-title">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
              <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
            </svg>
            <h1>LAN Clipboard</h1>
          </div>
          <button id="qr-btn" class="icon-btn" aria-label="QRコードを表示">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/>
              <rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/>
              <rect x="5" y="5" width="3" height="3" fill="currentColor" stroke="none"/>
              <rect x="16" y="5" width="3" height="3" fill="currentColor" stroke="none"/>
              <rect x="5" y="16" width="3" height="3" fill="currentColor" stroke="none"/>
              <path d="M14 14h3v3h-3z M17 14h3 M17 17v3 M14 17h.01 M14 20h3v-3"/>
            </svg>
          </button>
        </div>
      </header>

      <main>
        <section class="input-section">
          <textarea
            id="clip-input"
            placeholder="テキストを貼り付けるか入力してください..."
            rows="4"
          ></textarea>
          <div class="input-actions">
            <label class="file-btn" for="file-input">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
              </svg>
              ファイル追加
            </label>
            <input type="file" id="file-input" multiple accept="*/*" />
            <button id="send-btn" class="primary-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
              送信
            </button>
          </div>
          <div id="drop-zone" class="drop-zone" hidden>
            <p>ここにファイルをドロップ</p>
          </div>
        </section>

        <section class="clips-section">
          <div class="clips-header">
            <h2>受信トレイ</h2>
            <span id="clip-count" class="badge">0</span>
          </div>
          <ul id="clips-list" class="clips-list"></ul>
          <p id="empty-message" class="empty-message">クリップはありません</p>
        </section>
      </main>
    </div>

    <!-- QRコードモーダル -->
    <div id="qr-modal" class="modal" hidden>
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>このページのQRコード</h3>
          <button class="modal-close" id="qr-close">✕</button>
        </div>
        <div id="qr-container"></div>
        <p class="modal-url" id="qr-url"></p>
      </div>
    </div>

    <!-- 画像拡大モーダル -->
    <div id="img-modal" class="modal" hidden>
      <div class="modal-backdrop"></div>
      <div class="modal-content modal-img-content">
        <button class="modal-close" id="img-close">✕</button>
        <img id="modal-img" src="" alt="拡大表示" />
      </div>
    </div>

    <div id="toast" class="toast" hidden></div>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
